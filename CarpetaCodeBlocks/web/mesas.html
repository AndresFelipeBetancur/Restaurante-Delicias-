<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles/mesas.css">
    <title>Mesas</title>
</head>
<body>
    <h1>Mesas</h1>

    <form id="formulario" action="/" method="POST">
        
        <div class="contenedorEntrada">
            <label for="codigo">Digite el codigo de su mesa.</label>
            <input required type="text" name="codigo" placeholder="Ingrese codigo de mesa">
        </div>
        
        <button type="submit">Ingresar</button>
        
        
        
        
    </form>

    <div id="contenedorBoton">
        <button id="boton" onclick="window.location.href='./'">
            <h2>Regresar</h2>
        </button>
    </div>

</body>
</html>

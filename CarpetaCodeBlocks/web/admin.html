<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Administracion</title>
    <link rel="stylesheet" href="styles/admin.css">
</head>
<body>

    <h1>Administracion del sistema</h1>

    <div id="contenedorPrincipal">
        <button class="boton">
            <h2>Agregar</h2>
            <p>Agrega un nuevo empleado al sistema.</p>
        </button>
        
        <button class="boton">
            <h2>Visualizar</h2>
            <p>Visualiza los empleados del sistema.</p>
        </button>
        
        <button class="boton">
            <h2>Eliminar</h2>
            <p>Deshabilita un usuario del sistema.</p>
        </button>
        
        <button class="boton">
            <h2>Actualizar</h2>
            <p>Actualiza las credenciales de un usuario del sistema.</p>
        </button>

    </div>


</body>
</html>

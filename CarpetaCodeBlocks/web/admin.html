<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Administracion</title>
    <link rel="stylesheet" href="styles/admin.css">
    <script>
        const params = new URLSearchParams(window.location.search);
        const msg = params.get("msg");

        if (msg) {
            alert(msg); // muestra el mensaje real
            window.history.replaceState({}, document.title, "/admin.html");
        }
    </script>
</head>
<body>

    <h1>Administracion del sistema</h1>


    <div id="contenedorPrincipal">
        <button class="boton" onclick="window.location.href='/agregarUsuario'">
            <h2>Agregar</h2>
            <p>Agrega un nuevo empleado al sistema.</p>
            
        </button>
        
        <button class="boton" onclick="window.location.href='/verUsuario'">
            <h2>Visualizar</h2>
            <p>Visualiza los empleados del sistema.</p>
        </button>
        
        <button class="boton" onclick="window.location.href='/eliminarU'">
            <h2>Eliminar / Habilitar</h2>
            <p>Deshabilita o habilita un usuario del sistema.</p>
        </button>
         
        <button class="boton" onclick="window.location.href='/actualizarU'">
            <h2>Actualizar</h2>
            <p>Actualiza las credenciales de un usuario del sistema.</p>
        </button>

    </div>

    <div id="contenedorBoton">
        <button id="boton" onclick="window.location.href='./'">
            <h2>Regresar</h2>
        </button>
    </div>

</body>
</html>

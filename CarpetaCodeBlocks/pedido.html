<!DOCTYPE html>
<html>
<head>
    <title>Pedido Restaurante</title>
</head>
<body>
    <h2>Hacer Pedido</h2>

    <input type="text" id="pedido" placeholder="Ej: 2 hamburguesas">
    <button onclick="enviarPedido()">Enviar</button>

    <script>
        function enviarPedido() {
            const pedido = document.getElementById("pedido").value;

            fetch("http://192.168.1.34:8080/pedido", {
                method: "POST",
                body: pedido
            })
            .then(res => res.text())
            .then(data => alert(data))
            .catch(err => alert("Error: " + err));
        }
    </script>
</body>
</html>
